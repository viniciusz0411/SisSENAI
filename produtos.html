<!DOCTYPE html>
<html lang='pt-br'>
<head>
  <meta charset='UTF-8'>
  <link rel='stylesheet' href='estilo.css'>
  <title>SisSenai - Cadrasto de Clientes.</title>
</head>
<body>
  <nav>
    <a href='index.html'>Home</a>
    <a href='clientes.html'>Clientes</a>
    <a href='produtos.html'>Produtos</a>
    <a href='vendas.html'>Vendas</a>
    <a href='consulta_vendas.html'>Consulta Vendas</a>
  </nav>
  <header class='banner'>
    <h1>Gestão de Clientes</h1>
    <p>Cadraste e gerencie sua base de contatos</p>
  </header>

  <div class='container'>
    <div class='card'>
      <h2>Novo Produto</h2>
      <form action='/salvar-Produto' method='POST'>
        <input type='text' name='descricao' placeholder='Descrição do Produto' required>
        <input type='number' step='0.01'name='preco' placeholder='Preço da Venda' required>
        <input type='number' name='estoque' placeholder='Quantia em Estoque' required>
        <button type='submit'>Salvar no Estoque</button>
      </form>
    </div>

    <div class='card' style='margin-top:20px;'>
      <h2>Produtos no Estoque</h2>
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Preço</th>
            <th>Estoque</th>
          </tr>
        </thead>
        <tbody id='lista-produtos'>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    fetch('/listar-produtos')
      .then(res=> res.json())
      .then(produtos=>{
        const corpoTabela=document.getElementById('lista-produtos');
        produtos.forEach(c=>{
          corpoTabela.innerHTML+=`
            <tr>
                <td>${p.descricao}</td>
                <td>${p.preco.toFixed(2)}</td>
                <td>${p.telefone}</td>
            </tr>`;
      });
    });
  </script>
</body>
<footer class='rodape'>

  </div>
</footer>
</html>
